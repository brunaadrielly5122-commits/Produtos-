<!DOCTYPE html>
<html>
<head>
  <title>CRUD Produtos</title>
</head>
<body>

<h1>CRUD de Produtos</h1>

<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço" type="number">
<button onclick="adicionar()">Adicionar</button>

<ul id="lista"></ul>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

function salvar() {
  localStorage.setItem("produtos", JSON.stringify(produtos));
}

function carregar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  produtos.forEach((p, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${p.nome} - R$${p.preco}
      <button onclick="editar(${index})">Editar</button>
      <button onclick="deletar(${index})">X</button>
    `;
    lista.appendChild(li);
  });
}

function adicionar() {
  const nome = document.getElementById("nome").value;
  const preco = document.getElementById("preco").value;

  if (!nome || !preco) {
    alert("Preencha tudo!");
    return;
  }

  produtos.push({ nome, preco });
  salvar();
  carregar();

  document.getElementById("nome").value = "";
  document.getElementById("preco").value = "";
}

function deletar(index) {
  produtos.splice(index, 1);
  salvar();
  carregar();
}

function editar(index) {
  const novoNome = prompt("Novo nome:", produtos[index].nome);
  const novoPreco = prompt("Novo preço:", produtos[index].preco);

  if (novoNome && novoPreco) {
    produtos[index] = { nome: novoNome, preco: novoPreco };
    salvar();
    carregar();
  }
}

carregar();
</script>

</body>
</html>
